<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>科蓁智能理財管家 | 專業護眼版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCnvmKp-2RUjFuiJNlrkoRw5OkTzz-Bbi4",
            authDomain: "kj-wealth-manager.firebaseapp.com",
            projectId: "kj-wealth-manager",
            storageBucket: "kj-wealth-manager.firebasestorage.app",
            messagingSenderId: "532297127909",
            appId: "1:532297127909:web:141ebf2302cfba674f1774",
            measurementId: "G-97CH8PGFV6"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        window.db = db;
        window.auth = auth;
        window.appId = 'kj-wealth-manager';
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Noto Sans TC', 'sans-serif'] },
                    colors: {
                        pageBg: '#020617',
                        cardBg: '#0f172a',
                        accent: '#3b82f6',
                        border: '#1e293b'
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; -webkit-tap-highlight-color: transparent; }
        .hide { display: none !important; }
        #security-overlay { backdrop-filter: blur(16px); background: rgba(2, 6, 23, 0.95); }
        .glass-card { background: #0f172a; border: 1px solid #1e293b; border-radius: 1.25rem; }
        .tab-active { color: #3b82f6 !important; position: relative; }
        .tab-active::after { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 20px; height: 3px; background: #3b82f6; border-radius: 0 0 4px 4px; }
        .scan-line { height: 2px; background: linear-gradient(90deg, transparent, #3b82f6, transparent); width: 100%; position: absolute; animation: scan 2.5s infinite linear; }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
        #custom-alert { display: none; position: fixed; top: 10%; left: 50%; transform: translateX(-50%); z-index: 200; }
        input { background-color: #020617 !important; border: 1px solid #1e293b !important; color: #ffffff !important; }
        button:active { transform: scale(0.98); }
    </style>
</head>
<body class="antialiased">

    <!-- 身份驗證遮罩層 -->
    <div id="security-overlay" class="fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="max-w-md w-full glass-card p-8 text-center shadow-2xl">
            <div class="w-20 h-20 bg-blue-900/20 text-blue-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="fingerprint" class="w-10 h-10"></i>
            </div>
            <h2 class="text-2xl font-black mb-1 text-white">安全驗證</h2>
            <p class="text-slate-500 text-xs mb-8 uppercase tracking-widest">KJ Wealth Management System</p>
            
            <div class="space-y-4 text-left mb-6">
                <div>
                    <label class="text-[10px] font-bold text-slate-500 ml-1 uppercase mb-1 block">帳號 ID</label>
                    <input type="text" id="auth-email" placeholder="shchyu61" class="w-full rounded-xl py-4 px-4 text-sm font-bold outline-none">
                </div>
                <div id="section-daily-key">
                    <label class="text-[10px] font-bold text-slate-500 ml-1 uppercase mb-1 block">每日密碼</label>
                    <input type="password" id="access-key-input" placeholder="••••••••" class="w-full rounded-xl py-4 px-4 text-xl font-bold tracking-widest outline-none">
                </div>
            </div>

            <button id="btn-verify-key" class="w-full py-4 bg-blue-600 text-white rounded-xl font-black hover:bg-blue-500 transition-all flex items-center justify-center gap-2 mb-6">
                進入系統
            </button>

            <div class="relative mb-6">
                <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-slate-800"></div></div>
                <div class="relative flex justify-center text-[10px] uppercase"><span class="bg-[#0f172a] px-2 text-slate-600 font-bold tracking-widest">或使用電子郵件</span></div>
            </div>

            <div id="otp-step1">
                <button id="btn-send-otp" class="w-full py-4 border border-slate-700 text-slate-300 rounded-xl font-bold hover:bg-slate-800 transition-all text-sm">
                    發送 OTP 驗證碼
                </button>
            </div>
            
            <div id="otp-step2" class="hide space-y-4">
                <input type="text" id="otp-input" placeholder="6 碼驗證碼" maxlength="6" class="w-full rounded-xl py-4 text-center text-2xl font-black tracking-[0.5em] outline-none">
                <button id="btn-verify-otp" class="w-full py-4 bg-emerald-600 text-white rounded-xl font-black">驗證 OTP</button>
            </div>

            <div id="error-msg" class="text-rose-500 text-[10px] mt-4 font-bold opacity-0 transition-opacity uppercase tracking-widest">驗證失敗，請重新確認</div>
        </div>
    </div>

    <!-- 頂部標題 -->
    <nav class="fixed top-0 w-full z-40 bg-pageBg/80 backdrop-blur-md border-b border-border">
        <div class="max-w-4xl mx-auto px-6 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 rounded bg-blue-600 flex items-center justify-center text-white font-black italic text-sm">K</div>
                <span class="font-black text-sm tracking-tighter text-white uppercase italic">PRO MANAGER</span>
            </div>
            <button id="btn-logout" class="hide text-[10px] font-black text-slate-500 hover:text-white transition-colors uppercase">LOGOUT</button>
        </div>
    </nav>

    <!-- 主內容區 -->
    <main id="main-content" class="hide pt-20 pb-32 px-4 max-w-4xl mx-auto">
        <!-- 待買進 -->
        <div id="page-watchlist" class="space-y-6">
            <header class="py-4">
                <h3 class="text-2xl font-black text-white italic">WATCHLIST</h3>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em]">待買進清單</p>
            </header>
            <div class="glass-card p-6">
                <div class="flex gap-2 mb-6">
                    <input type="text" id="new-watchlist-input" placeholder="輸入代號 (如: NVDA)" class="flex-1 rounded-xl px-4 py-3 text-sm font-bold outline-none uppercase">
                    <button id="btn-add-watchlist" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-black text-xs">新增</button>
                </div>
                <div id="watchlist-list" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            </div>
        </div>

        <!-- 持有中 -->
        <div id="page-monitor" class="hide space-y-6">
            <header class="py-4">
                <h3 class="text-2xl font-black text-white italic">PORTFOLIO</h3>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em]">持有部位清單</p>
            </header>
            <div class="glass-card p-6">
                <div class="flex gap-2 mb-6">
                    <input type="text" id="new-stock-input" placeholder="輸入代號 (如: 2330)" class="flex-1 rounded-xl px-4 py-3 text-sm font-bold outline-none uppercase">
                    <button id="btn-add-stock" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-black text-xs">新增</button>
                </div>
                <div id="stock-list" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>
            </div>
        </div>

        <!-- AI 診斷 -->
        <div id="page-scan" class="hide space-y-6">
            <header class="py-4">
                <h3 class="text-2xl font-black text-white italic">INTELLIGENCE SCAN</h3>
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-[0.2em]">AI 市場診斷</p>
            </header>
            <div class="glass-card p-8 relative overflow-hidden min-h-[400px]">
                <div id="scan-visual" class="hide scan-line"></div>
                <div class="flex flex-col items-center justify-center py-10 text-center">
                    <div class="w-16 h-16 bg-blue-500/10 rounded-full flex items-center justify-center text-blue-500 mb-6 border border-blue-500/20">
                        <i data-lucide="cpu" class="w-8 h-8"></i>
                    </div>
                    <h4 class="text-xl font-black mb-2">準備進行雲端運算</h4>
                    <p class="text-slate-500 text-sm mb-8">系統將抓取最新 RSI、MACD 指標與雲端大數據分析</p>
                    <button onclick="startManualScan()" class="px-10 py-4 bg-blue-600 text-white rounded-full font-black text-sm hover:shadow-lg shadow-blue-500/20 transition-all">啟動完整診斷</button>
                </div>
                <div id="diagnostic-result" class="hide p-6 bg-slate-950/80 border border-slate-800 rounded-2xl animate-pulse">
                    <p id="report-text" class="text-sm font-bold text-slate-300 leading-relaxed italic"></p>
                </div>
            </div>
        </div>

        <!-- 帳號設定 -->
        <div id="page-settings" class="hide space-y-6">
            <div class="glass-card p-8">
                <p class="text-[10px] font-black text-slate-500 mb-2 uppercase">Current User</p>
                <div id="settings-email" class="font-black text-white text-xl italic">尚未登入</div>
                <div class="mt-8 pt-8 border-t border-slate-800">
                    <div class="flex items-center gap-4 text-emerald-500">
                        <i data-lucide="shield-check" class="w-5 h-5"></i>
                        <span class="text-sm font-bold">雲端加密傳輸已啟用</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部導覽列 -->
    <div id="tab-bar" class="hide fixed bottom-0 w-full bg-pageBg border-t border-border px-4 py-2 pb-8 shadow-2xl z-50">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <button onclick="switchPage('watchlist')" id="tab-watchlist" class="flex-1 flex flex-col items-center gap-1 py-3 text-slate-400 tab-active">
                <i data-lucide="star" class="w-5 h-5"></i><span class="text-[10px] font-black">待買進</span>
            </button>
            <button onclick="switchPage('monitor')" id="tab-monitor" class="flex-1 flex flex-col items-center gap-1 py-3 text-slate-400">
                <i data-lucide="pie-chart" class="w-5 h-5"></i><span class="text-[10px] font-black">持有中</span>
            </button>
            <button onclick="switchPage('scan')" id="tab-scan" class="flex-1 flex flex-col items-center gap-1 py-3 text-slate-400">
                <i data-lucide="zap" class="w-5 h-5"></i><span class="text-[10px] font-black">AI診斷</span>
            </button>
            <button onclick="switchPage('settings')" id="tab-settings" class="flex-1 flex flex-col items-center gap-1 py-3 text-slate-400">
                <i data-lucide="user" class="w-5 h-5"></i><span class="text-[10px] font-black">我的</span>
            </button>
        </div>
    </div>

    <!-- 提醒框 -->
    <div id="custom-alert" class="bg-blue-600 text-white px-6 py-3 rounded-full shadow-2xl font-black text-xs flex items-center gap-2">
        <i data-lucide="info" class="w-4 h-4"></i><span id="alert-text"></span>
    </div>

    <script type="module">
        import { doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        lucide.createIcons();
        emailjs.init('5dk4HoCBYIS7ypwiw');

        const ALLOWED = ["shchyu61@gmail.com", "70.2.7wendy@gmail.com", "dad@gmail.com", "mom@gmail.com", "shchyu61@yahoo.com.tw", "70.2.7wendy@yahoo.com.tw", "dcyu0905@gmail.com", "dcyu09056@gmail.com", "dzyu1115@gmail.com"];
        const NAME_MAP = { "2330": "台積電", "NVDA": "NVIDIA", "AAPL": "Apple", "TSLA": "Tesla", "BTC": "比特幣", "ETH": "乙太幣" };

        let stocks = [], watchlist = [], currentEmail = "", otpCode = "", otpExpiry = 0;

        window.showAlert = (m) => {
            const el = document.getElementById('custom-alert');
            document.getElementById('alert-text').innerText = m;
            el.style.display = 'flex';
            setTimeout(() => el.style.display = 'none', 3000);
        };

        const getEmail = () => {
            let e = document.getElementById('auth-email').value.trim().toLowerCase();
            return e.includes('@') ? e : e + '@gmail.com';
        };

        const getDailyKey = (e) => {
            const n = e.split('@')[0], d = new Date();
            const f = new Intl.DateTimeFormat('zh-TW', { timeZone: 'Asia/Taipei', month: '2-digit', day: '2-digit' });
            const p = f.formatToParts(d);
            return `601${p.find(x => x.type === 'month').value}${p.find(x => x.type === 'day').value}${n}`.toLowerCase();
        };

        const save = async () => {
            if (currentEmail) {
                const id = currentEmail.toLowerCase().replace(/[@.]/g, '_');
                try {
                    await setDoc(doc(window.db, 'artifacts', window.appId, 'public', 'data', 'sharedStocks', id), {
                        stocks, watchlist, email: currentEmail, updated: new Date().toISOString()
                    });
                } catch (e) { console.error(e); }
            }
        };

        const load = async (e) => {
            await signInAnonymously(window.auth);
            const id = e.toLowerCase().replace(/[@.]/g, '_');
            const snap = await getDoc(doc(window.db, 'artifacts', window.appId, 'public', 'data', 'sharedStocks', id));
            if (snap.exists()) {
                stocks = snap.data().stocks || [];
                watchlist = snap.data().watchlist || [];
                renderStocks();
                renderWatchlist();
            }
        };

        const complete = async (e) => {
            currentEmail = e;
            await load(e);
            document.getElementById('security-overlay').classList.add('hide');
            document.getElementById('main-content').classList.remove('hide');
            document.getElementById('tab-bar').classList.remove('hide');
            document.getElementById('btn-logout').classList.remove('hide');
            document.getElementById('settings-email').innerText = e;
        };

        document.getElementById('btn-verify-key').onclick = () => {
            const e = getEmail(), k = document.getElementById('access-key-input').value.trim().toLowerCase();
            if (ALLOWED.includes(e) && k === getDailyKey(e)) complete(e);
            else document.getElementById('error-msg').style.opacity = '1';
        };

        document.getElementById('btn-send-otp').onclick = async () => {
            const e = getEmail();
            if (!ALLOWED.includes(e)) return showAlert('非授權帳號');
            otpCode = Math.floor(100000 + Math.random() * 900000).toString();
            otpExpiry = Date.now() + 300000;
            try {
                await emailjs.send('service_knhvcfj', 'template_oqm4kw9', { to_email: e, otp: otpCode });
                document.getElementById('otp-step1').classList.add('hide');
                document.getElementById('otp-step2').classList.remove('hide');
                showAlert('密碼已發送');
            } catch (err) { showAlert('發送失敗'); }
        };

        document.getElementById('btn-verify-otp').onclick = () => {
            if (document.getElementById('otp-input').value.trim() === otpCode && Date.now() < otpExpiry) complete(getEmail());
            else document.getElementById('error-msg').style.opacity = '1';
        };

        const renderStocks = () => {
            document.getElementById('stock-list').innerHTML = stocks.map(s => `
                <div class="flex items-center justify-between p-5 glass-card">
                    <div class="font-black text-white">${s.code} <span class="text-[10px] text-slate-500 ml-2 font-normal">${NAME_MAP[s.code] || ''}</span></div>
                    <button onclick="window.removeStock('${s.code}')" class="text-slate-600 hover:text-rose-500"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        };

        const renderWatchlist = () => {
            document.getElementById('watchlist-list').innerHTML = watchlist.map(s => `
                <div class="flex items-center justify-between p-5 glass-card">
                    <div class="font-black text-white">${s.code} <span class="text-[10px] text-slate-500 ml-2 font-normal">${NAME_MAP[s.code] || ''}</span></div>
                    <button onclick="window.removeWatchlist('${s.code}')" class="text-slate-600 hover:text-rose-500"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        };

        document.getElementById('btn-add-stock').onclick = async () => {
            const v = document.getElementById('new-stock-input').value.trim().toUpperCase();
            if (v && !stocks.some(x => x.code === v)) { stocks.push({code:v}); document.getElementById('new-stock-input').value=''; renderStocks(); await save(); }
        };
        window.removeStock = async (c) => { stocks = stocks.filter(x => x.code !== c); renderStocks(); await save(); };

        document.getElementById('btn-add-watchlist').onclick = async () => {
            const v = document.getElementById('new-watchlist-input').value.trim().toUpperCase();
            if (v && !watchlist.some(x => x.code === v)) { watchlist.push({code:v}); document.getElementById('new-watchlist-input').value=''; renderWatchlist(); await save(); }
        };
        window.removeWatchlist = async (c) => { watchlist = watchlist.filter(x => x.code !== c); renderWatchlist(); await save(); };

        window.switchPage = (p) => {
            ['watchlist', 'monitor', 'scan', 'settings'].forEach(id => {
                document.getElementById(`page-${id}`).classList.add('hide');
                document.getElementById(`tab-${id}`).classList.remove('tab-active');
            });
            document.getElementById(`page-${p}`).classList.remove('hide');
            document.getElementById(`tab-${p}`).classList.add('tab-active');
        };

        window.startManualScan = () => {
            if (stocks.length === 0) return showAlert('清單中無資產可供診斷');
            const v = document.getElementById('scan-visual'), r = document.getElementById('diagnostic-result'), t = document.getElementById('report-text');
            v.classList.remove('hide'); r.classList.add('hide');
            setTimeout(() => {
                v.classList.add('hide'); r.classList.remove('hide');
                t.innerHTML = `[AI 診斷報告]<br>當前部位狀況：良好<br>分析對象：${stocks.map(s => s.code).join(', ')}<br>技術指標：RSI 位於 55-62 區間，未見超買。<br>策略建議：繼續持有，並於回測支撐時分批佈局。`;
            }, 2500);
        };

        document.getElementById('btn-logout').onclick = () => location.reload();
    </script>
</body>
</html>
