# ============================================================
# GitHub Actions：股票自動掃描排程
# 檔案位置：.github/workflows/stock_scan.yml
# 說明：
#   scan job      → 每週一~五 09:00 和 13:30（台灣時間）自動執行
#   futures-scan  → 週一13:00~週三11:30，日盤/夜盤每5分鐘，深夜01~05每15分鐘
#                   ★ K線週期固定5分K不變，只有觸發頻率深夜較低
#                   由 Python 自行判斷時段，非時段直接 exit
#
# 【深夜01:00~05:00處理邏輯】
#   cron仍然全時段觸發（讓Python決定要不要跑）
#   Python判斷：
#     無持倉 → 直接 exit（省額度）
#     有持倉 → 只掃平倉條件，不掃買進（保護已建倉部位）
# 台灣時間 = UTC+8
# ============================================================

name: 股票週K自動掃描通知

on:
  schedule:
    # ── 週K掃描：台灣時間 09:00 = UTC 01:00（週一~五）──
    - cron: '0 1 * * 1-5'
    # ── 週K掃描：台灣時間 13:30 = UTC 05:30（週一~五）──
    - cron: '30 5 * * 1-5'

    # ══ 期貨5分K：日盤/夜盤每5分鐘，深夜01~05每15分鐘（K線週期固定5分K不變）══
    #
    # 週一 日盤+夜盤（非深夜）台灣13:00~次日01:00 = UTC 05:00~17:00週一 → 每5分鐘
    - cron: '*/5 5-16 * * 1'
    # 週二凌晨01:00~05:00（睡覺）台灣 = UTC 17:00~21:00週一 → 每15分鐘（嚴格條件）
    - cron: '*/15 17-21 * * 1'
    # 週二 日盤+夜盤（非深夜）台灣09:00~次日01:00 = UTC 01:00~17:00週二 → 每5分鐘
    - cron: '*/5 1-16 * * 2'
    # 週三凌晨01:00~05:00（睡覺）台灣 = UTC 17:00~21:00週二 → 每15分鐘（嚴格條件）
    - cron: '*/15 17-21 * * 2'
    # 週三 凌晨05:00~收盤11:30 台灣 = UTC 週二21:00~週三03:30 → 每5分鐘
    - cron: '*/5 21-23 * * 2'
    - cron: '*/5 0-3 * * 3'

  # 允許手動觸發（測試用）
  workflow_dispatch:

jobs:
  # ============================================================
  # Job 1：週K掃描（原有，不動）
  # ============================================================
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 55    # 台股1827支掃描需要約45分鐘，設55分鐘避免超時

    steps:
      # 1. 取得程式碼
      - name: 取得程式碼
        uses: actions/checkout@v4

      # 2. 安裝 Python 3.11
      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. 安裝所需套件
      - name: 安裝套件
        run: |
          pip install yfinance pandas pandas-ta pytz twstock

      # 4. 執行股票掃描（密碼從 GitHub Secrets 讀取）
      - name: 執行股票掃描
        env:
          GMAIL_ACCOUNT:  ${{ secrets.GMAIL_ACCOUNT }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: |
          python 3_stock_monitor_GitHub.py

  # ============================================================
  # Job 2：期貨5分K掃描（新增）
  # TEST_MODE='5mk' 由環境變數傳入，Python 自行判斷時段
  # 非時段（週一15:01前、週三13:30後）Python 會直接 exit
  # ============================================================
  futures-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10     # 單次最多8分鐘（5分K一次掃描足夠）

    steps:
      # 1. 取得程式碼
      - name: 取得程式碼
        uses: actions/checkout@v4

      # 2. 安裝 Python 3.11
      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3. 安裝所需套件
      - name: 安裝套件
        run: |
          pip install yfinance pandas pandas-ta pytz twstock cryptography

      # 4. 執行期貨5分K掃描
      #    TEST_MODE='5mk' → 觸發期貨模式
      #    Python 內部時段判斷：非時段直接 exit，不發任何通知
      #    FIREBASE_SERVICE_KEY → Service Account JSON，用於寫入期貨狀態到 Firebase
      - name: 執行期貨5分K掃描
        env:
          GMAIL_ACCOUNT:        ${{ secrets.GMAIL_ACCOUNT }}
          GMAIL_PASSWORD:       ${{ secrets.GMAIL_PASSWORD }}
          TEST_MODE:            '5mk'
          FIREBASE_SERVICE_KEY: ${{ secrets.FIREBASE_SERVICE_KEY }}
        run: |
          python 3_stock_monitor_GitHub.py
