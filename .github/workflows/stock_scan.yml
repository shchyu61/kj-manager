# ============================================================
# GitHub Actions：股票自動掃描排程
# 檔案位置：.github/workflows/stock_scan.yml
# 說明：每週一~五 09:00 和 14:30（台灣時間）自動執行
#       等同 UTC 01:00 和 06:30（台灣 = UTC+8）
# ============================================================

name: 股票週K自動掃描通知

on:
  schedule:
    # 台灣時間 09:00 = UTC 01:00（週一~五）
    - cron: '0 1 * * 1-5'
    # 台灣時間 14:30 = UTC 06:30（週一~五）
    - cron: '30 6 * * 1-5'
  # 允許手動觸發（測試用）
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30    # 最多跑30分鐘，避免超時

    steps:
      # 1. 取得程式碼
      - name: 取得程式碼
        uses: actions/checkout@v4

      # 2. 安裝 Python 3.11
      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 安裝所需套件
      - name: 安裝套件
        run: |
          pip install yfinance pandas pandas-ta pytz twstock

      # 4. 執行股票掃描（密碼從 GitHub Secrets 讀取）
      - name: 執行股票掃描
        env:
          GMAIL_ACCOUNT:  ${{ secrets.GMAIL_ACCOUNT }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: |
          python 3_stock_monitor_GitHub.py

